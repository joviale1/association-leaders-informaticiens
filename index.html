<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Association des Leaders Informaticiens (ALI) — Bénin</title>
    <meta name="description" content="Site vitrine de l'Association des Leaders Informaticiens (ALI) du Bénin - Abomey-Calavi. Unir les acteurs de l'informatique." />
    <meta name="theme-color" content="#1CADC4" />

    <!-- Favicon & Touch Icon -->
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="shortcut icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <link rel="image_src" href="https://ali-benin.vercel.app/logo.jpg" />

    <!-- Schema.org / Google / WhatsApp -->
    <meta itemprop="name" content="ALI — Association des Leaders Informaticiens" />
    <meta itemprop="description" content="Ensemble, on est plus fort ! Découvrez l'annuaire, les formations et les événements de l'ALI Bénin." />
    <meta itemprop="image" content="https://ali-benin.vercel.app/logo.jpg" />

    <!-- Open Graph / Facebook / WhatsApp Vignette -->
    <meta property="og:site_name" content="ALI Bénin" />
    <meta property="og:title" content="ALI — Association des Leaders Informaticiens" />
    <meta property="og:description" content="Ensemble, on est plus fort ! Découvrez l'annuaire, les formations et les événements de l'ALI Bénin." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ali-benin.vercel.app/" />

    <!-- Primary OG Image (Logo Square / Vignette) -->
    <meta property="og:image" content="https://ali-benin.vercel.app/logo.jpg" />
    <meta property="og:image:secure_url" content="https://ali-benin.vercel.app/logo.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="400" />
    <meta property="og:image:height" content="400" />
    <meta property="og:image:alt" content="Logo Association des Leaders Informaticiens Bénin" />

    <!-- Secondary OG Image (Banner 1200x630) -->
    <meta property="og:image" content="https://ali-benin.vercel.app/og-image.jpg" />
    <meta property="og:image:secure_url" content="https://ali-benin.vercel.app/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ALI — Association des Leaders Informaticiens" />
    <meta name="twitter:description" content="Ensemble, on est plus fort ! Découvrez l'annuaire, les formations et les événements de l'ALI Bénin." />
    <meta name="twitter:image" content="https://ali-benin.vercel.app/og-image.jpg" />

    <!-- Script to dynamically adapt OG URLs to current origin if hosted elsewhere -->
    <script>
      (function() {
        if (typeof window !== 'undefined' && window.location && window.location.origin) {
          var origin = window.location.origin;
          if (!origin.includes('localhost') && !origin.includes('127.0.0.1')) {
            var ogUrl = document.querySelector('meta[property="og:url"]');
            if (ogUrl) ogUrl.setAttribute('content', origin + '/');
          }
        }
      })();
    </script>

    <link rel="manifest" href="/manifest.json" />
  </head>
  <body class="bg-[#fafbfc] text-[#0B2545] font-sans antialiased selection:bg-[#1CADC4] selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker enregistré !', reg))
            .catch(err => console.log('Erreur Service Worker', err));
        });
      }
    </script>
  </body>
</html>
